<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>WordPress安装选项</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f7f7f7;
        }
        .container {
            width: 80%;
            margin: 0 auto;
            padding: 20px;
            background-color: #fff;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        h1 {
            text-align: center;
            margin-bottom: 20px;
        }
        .options {
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
        }
        .option {
            flex-basis: 45%;
            background-color: #e9ecef;
            padding: 20px;
            border-radius: 5px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            cursor: pointer;
        }
        .option:hover {
            background-color: #dde2e6;
        }
        .option h3 {
            margin-top: 0;
        }
        .download {
            text-align: center;
            margin-top: 20px;
        }
        .download a {
            display: inline-block;
            padding: 10px 20px;
            background-color: #007bff;
            color: white;
            text-decoration: none;
            border-radius: 5px;
        }
        .download a:hover {
            background-color: #0056b3;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>WordPress安装选项</h1>
        <div class="options">
            <div class="option">
                <h3>下载并自行安装</h3>
                <p>适用于能够轻松获得自己的主机和域名的用户。</p>
            </div>
            <div class="option">
                <h3>与托管提供商一起设置</h3>
                <p>适用于寻找最简单入门方法的人。</p>
            </div>
        </div>
        <div class="download">
            <a href="#">下载WordPress 6.5.4</a>
        </div>
    </div>
</body>
</html>
